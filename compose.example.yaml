services:
  caddy:
    image: caddy:2.10-alpine
    container_name: sitgame-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16
    container_name: sitgame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: 2026-game
      POSTGRES_PASSWORD: 2026-game-password
      POSTGRES_DB: 2026-game
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 2026-game -d 2026-game"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitgame-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: 2026-game
      DB_PASSWORD: 2026-game-password
      DB_NAME: 2026-game
      DB_SSL_MODE: disable
      CORS_ALLOWED_ORIGINS: http://localhost
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sitgame-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_URL: http://caddy/api
      NEXT_PUBLIC_API_PROXY_TARGET: http://backend:8000/api
    expose:
      - "3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
